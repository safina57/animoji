# ─────────────────────────────────────────────────────────────────────────────
# nginx/prod-vm.conf — Host nginx configuration for the Azure VM
#
# This file runs on the VM HOST (not inside Docker).
# Deploy to: /etc/nginx/sites-available/animoji
# Enable with: ln -s /etc/nginx/sites-available/animoji /etc/nginx/sites-enabled/animoji
#
# Replace YOUR_DOMAIN with your actual domain before deploying:
#   sudo sed -i 's/YOUR_DOMAIN/yourdomain.com/g' /etc/nginx/sites-available/animoji
#
# Architecture:
#   Internet (port 443/80)
#     → Host nginx (TLS termination)
#       ├── yourdomain.com       → localhost:3000 (frontend Docker container)
#       ├── api.yourdomain.com   → localhost:8080 (gateway Docker container)
#       └── media.yourdomain.com → localhost:9000 (MinIO S3 API direct)
#
# After certbot runs, it will ADD the ssl_certificate lines automatically.
# The server blocks below are the baseline — certbot modifies them.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Redirect all HTTP traffic to HTTPS ──────────────────────────────────────
# This is the only thing port 80 does: tell clients to use HTTPS instead.
# 301 is a permanent redirect — browsers will remember and skip port 80 next time.
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN api.YOUR_DOMAIN media.YOUR_DOMAIN;

    # Let's Encrypt renewal challenge — certbot uses this path to prove domain
    # ownership without needing HTTPS to be set up yet.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend ─────────────────────────────────────────────────
# Serves the React SPA. The frontend container handles static files via its
# own internal nginx, but this host nginx adds TLS on top.
server {
    listen 443;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot fills these in automatically when you run `certbot --nginx`.
    # Leave these commented out — certbot will add them.
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── Security headers ────────────────────────────────────────────────────
    # These tell browsers how to handle your content safely.

    # HSTS: Force HTTPS for 2 years. includeSubDomains covers api.* and media.*
    # preload: tells browsers to pre-load your domain as HTTPS-only.
    # WARNING: Only add this after you're sure HTTPS works on ALL subdomains.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent your site from being embedded in iframes (clickjacking protection)
    add_header X-Frame-Options SAMEORIGIN always;

    # Prevent browsers from guessing content type (MIME sniffing protection)
    add_header X-Content-Type-Options nosniff always;

    # Basic XSS filter (old browsers; modern CSP is better but more complex)
    add_header X-XSS-Protection "1; mode=block" always;

    # Limit what browsers send in the Referrer header when leaving your site
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy to frontend container ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Pass the real client IP to the app (useful for logging)
        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
}

# ─── API Gateway: ──────────────────────────────────────────
# Proxies all API calls to the Go gateway container on port 8080.
# Special handling for SSE (Server-Sent Events) is required for the job
# streaming endpoints (/images/jobs/{id}/stream, /emojis/jobs/{id}/stream).
server {
    listen 443;
    server_name api.YOUR_DOMAIN;

    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;

    # ── SSE (Server-Sent Events) endpoints ─────────────────────────────────
    # These endpoints stream real-time job status updates to the browser.
    # Normal proxy settings buffer the response — that breaks SSE because
    # events would be held until the buffer is full instead of sent immediately.
    location ~ ^/(images|emojis)/jobs/[^/]+/stream {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Empty Connection header = keep the connection open (required for SSE)
        proxy_set_header Connection "";

        # CRITICAL for SSE: disable buffering so events are sent immediately
        proxy_buffering    off;
        proxy_cache        off;

        # SSE connections are long-lived — extend the timeout well beyond the
        # default 60s. Jobs can take minutes to generate.
        proxy_read_timeout 120s;

        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All other API routes ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for file uploads (original photos can be up to 10MB)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Increase max body size to allow file uploads (gateway allows 10MB)
        client_max_body_size 12M;
    }
}

# ─── Media (MinIO images): media.yourdomain.com ───────────────────────────────
# Proxies image requests directly to MinIO's S3 API on port 9000.
# MinIO's port 9000 is bound to 127.0.0.1 in docker-compose.prod.yml so only
# this host nginx can reach it — it is not accessible from the internet.
#
# Why proxy_set_header Host minio:9000?
# Presigned URLs are signed using "minio:9000" as the host (the internal Docker
# endpoint). MinIO verifies signatures by reading the Host header of incoming
# requests. Setting it to "minio:9000" here makes verification pass, even though
# the browser originally requested https://media.yourdomain.com.
server {
    listen 443;
    server_name media.YOUR_DOMAIN;

    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;

    # ── Cache images at the nginx level ────────────────────────────────────
    # Images are content-addressable (filename includes ID) and never change
    # once published. Cache them aggressively.
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        proxy_pass       http://127.0.0.1:9000;
        proxy_set_header Host              minio:9000;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header X-Content-Type-Options nosniff always;

        # Cache responses for 7 days (images don't change)
        expires 7d;
        # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass       http://127.0.0.1:9000;
        proxy_set_header Host              minio:9000;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
    }
}
