services:

  # ─── Frontend ────────────────────────────────
  frontend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/animoji-frontend:latest
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    depends_on:
      - gateway
    networks:
      - animoji-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: animoji-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - animoji-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ─── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: animoji-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - animoji-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─── API Gateway ─────────────────────────────────────────────────────
  gateway:
    image: ghcr.io/YOUR_GITHUB_USERNAME/animoji-gateway:latest
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - animoji-network
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── MinIO Object Storage ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    env_file:
      - .env
    volumes:
      - minio-data:/data
    networks:
      - animoji-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ─── MinIO Initialization ─────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb myminio/animoji-images --ignore-existing;
      mc anonymous set download myminio/animoji-images/images/public;
      mc anonymous set download myminio/animoji-images/thumbnails/public;
      mc anonymous set download myminio/animoji-images/emojis/public;
      printf '{\"Rules\":[{\"ID\":\"expire-tmp-24h\",\"Status\":\"Enabled\",\"Filter\":{\"Prefix\":\"tmp/\"},\"Expiration\":{\"Days\":1}}]}' | mc ilm import myminio/animoji-images;
      echo 'MinIO initialized: bucket, public access policies, and ILM lifecycle configured';
      "
    networks:
      - animoji-network
    restart: on-failure

  # ─── NATS Message Broker ──────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["-m", "8222"]
    networks:
      - animoji-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─── AI Worker ───────────────────────────────────────────
  ai-worker:
    image: ghcr.io/YOUR_GITHUB_USERNAME/animoji-ai-worker:latest
    env_file:
      - .env
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - animoji-network
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── Watchtower ─────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup --label-enable
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:

networks:
  animoji-network:
    driver: bridge
